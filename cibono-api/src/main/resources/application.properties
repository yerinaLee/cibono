spring.config.import=optional:application-secret.properties

# 저녁 알림 스케줄 (cron 표현식, 기본 매일 18:00 KST)
app.notification.dinner-cron=0 0 18 * * *
app.notification.timezone=Asia/Seoul

server.port=8080

# Tesseract OCR
tesseract.path=C:\\Program Files\\Tesseract-OCR\\tesseract.exe

# Application Name
spring.application.name=cibono-api
spring.mandatory-file-encoding=UTF-8

# Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fridge
spring.datasource.username=fridge
spring.datasource.password=fridge

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Flyway 비활성화 — 스키마는 schema.sql 수동 적용
spring.flyway.enabled=false

# ????? ???
server.error.include-message=always
server.error.include-binding-errors=always
